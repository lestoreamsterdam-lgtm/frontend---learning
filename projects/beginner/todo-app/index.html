<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Todo App - Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📝 Meu Todo App</h1>
            <p class="subtitle">Organize suas tarefas do dia</p>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Adicione uma nova tarefa..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Adicionar</button>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Concluídas:</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Pendentes:</span>
                    <span id="pendingCount" class="stat-value">0</span>
                </div>
            </section>

            <!-- Filter Buttons -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </section>

            <!-- Todos List -->
            <section class="todos-section">
                <ul id="todoList" class="todo-list">
                    <!-- Tarefas serão adicionadas aqui via JavaScript -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>📭 Nenhuma tarefa por aqui... Crie uma nova!</p>
                </div>
            </section>

            <!-- Clear Completed -->
            <section class="actions">
                <button id="clearBtn" class="clear-btn">Limpar Concluídas</button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Desenvolvido com ❤️ | Frontend Learning 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
